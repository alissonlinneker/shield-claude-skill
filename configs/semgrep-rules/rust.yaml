rules:
  # ---------------------------------------------------------------------------
  # SQL Injection
  # ---------------------------------------------------------------------------
  - id: rust-sql-injection
    patterns:
      - pattern-either:
          - pattern: |
              $CLIENT.query(&format!("...", $INPUT), ...)
          - pattern: |
              $CLIENT.execute(&format!("...", $INPUT), ...)
          - pattern: |
              sqlx::query(&format!("...", $INPUT))
          - pattern: |
              $CLIENT.query(& ("..." .to_owned() + &$INPUT + "..."), ...)
    message: >
      SQL query built with format! macro or string concatenation. Use
      parameterized queries with bind parameters (e.g., sqlx::query("SELECT
      ... WHERE id = $1").bind(id)) to prevent SQL injection.
    severity: ERROR
    languages: [rust]
    metadata:
      cwe: ["CWE-89"]
      owasp: ["A03:2021 Injection"]
      confidence: HIGH
      impact: CRITICAL
      category: security

  # ---------------------------------------------------------------------------
  # Command Injection
  # ---------------------------------------------------------------------------
  - id: rust-command-injection
    patterns:
      - pattern-either:
          - pattern: |
              Command::new($CMD)
          - pattern: |
              std::process::Command::new($CMD)
      - metavariable-pattern:
          metavariable: $CMD
          patterns:
            - pattern-not: "..."
    message: >
      std::process::Command created with a potentially user-controlled
      command name. Validate and sanitize all input. Prefer a hardcoded
      command name and pass user input only as arguments via .arg()
      after validation.
    severity: ERROR
    languages: [rust]
    metadata:
      cwe: ["CWE-78"]
      owasp: ["A03:2021 Injection"]
      confidence: MEDIUM
      impact: CRITICAL
      category: security

  # ---------------------------------------------------------------------------
  # Unsafe Block
  # ---------------------------------------------------------------------------
  - id: rust-unsafe-block
    pattern: |
      unsafe { ... }
    message: >
      Unsafe block detected. While sometimes necessary, unsafe code
      bypasses Rust's memory safety guarantees. Ensure this block has
      been carefully reviewed for memory safety, data races, and
      undefined behavior. Document why unsafe is required.
    severity: WARNING
    languages: [rust]
    metadata:
      cwe: ["CWE-676"]
      owasp: ["A04:2021 Insecure Design"]
      confidence: HIGH
      impact: MEDIUM
      category: security

  # ---------------------------------------------------------------------------
  # Hardcoded Secrets
  # ---------------------------------------------------------------------------
  - id: rust-hardcoded-secrets
    patterns:
      - pattern-either:
          - pattern: |
              let $X = "...";
          - pattern: |
              let $X: &str = "...";
          - pattern: |
              const $X: &str = "...";
          - pattern: |
              static $X: &str = "...";
      - metavariable-regex:
          metavariable: $X
          regex: (?i)(password|passwd|secret|api_key|apikey|token|secret_key|secretkey)
    message: >
      Hardcoded credential detected in a string literal. Store secrets
      in environment variables (std::env::var), a secrets manager, or
      encrypted configuration — never in source code.
    severity: ERROR
    languages: [rust]
    metadata:
      cwe: ["CWE-798"]
      owasp: ["A07:2021 Identification and Authentication Failures"]
      confidence: MEDIUM
      impact: HIGH
      category: security

  # ---------------------------------------------------------------------------
  # Insecure TLS
  # ---------------------------------------------------------------------------
  - id: rust-insecure-tls
    patterns:
      - pattern-either:
          - pattern: |
              .danger_accept_invalid_certs(true)
          - pattern: |
              .danger_accept_invalid_hostnames(true)
    message: >
      TLS certificate or hostname verification is disabled. This allows
      man-in-the-middle attacks. Remove this option or restrict it to
      development/testing environments only.
    severity: ERROR
    languages: [rust]
    metadata:
      cwe: ["CWE-295"]
      owasp: ["A02:2021 Cryptographic Failures"]
      confidence: HIGH
      impact: HIGH
      category: security

  # ---------------------------------------------------------------------------
  # Path Traversal
  # ---------------------------------------------------------------------------
  - id: rust-path-traversal
    patterns:
      - pattern-either:
          - pattern: |
              std::fs::read($PATH)
          - pattern: |
              std::fs::read_to_string($PATH)
          - pattern: |
              std::fs::write($PATH, ...)
          - pattern: |
              File::open($PATH)
          - pattern: |
              File::create($PATH)
          - pattern: |
              fs::read($PATH)
          - pattern: |
              fs::read_to_string($PATH)
          - pattern: |
              fs::write($PATH, ...)
      - metavariable-pattern:
          metavariable: $PATH
          patterns:
            - pattern-not: "..."
    message: >
      File system operation with a potentially user-controlled path.
      Canonicalize the path with std::fs::canonicalize and verify it
      stays within the intended base directory using starts_with()
      to prevent path traversal attacks.
    severity: WARNING
    languages: [rust]
    metadata:
      cwe: ["CWE-22"]
      owasp: ["A01:2021 Broken Access Control"]
      confidence: MEDIUM
      impact: HIGH
      category: security

  # ---------------------------------------------------------------------------
  # Panic in Production
  # ---------------------------------------------------------------------------
  - id: rust-panic-unwrap
    patterns:
      - pattern-either:
          - pattern: |
              $X.read(...).unwrap()
          - pattern: |
              $X.write(...).unwrap()
          - pattern: |
              $X.connect(...).unwrap()
          - pattern: |
              $X.send(...).unwrap()
          - pattern: |
              $X.recv(...).unwrap()
          - pattern: |
              $X.bind(...).unwrap()
          - pattern: |
              $X.accept().unwrap()
          - pattern: |
              $X.open(...).unwrap()
          - pattern: |
              reqwest::get(...).unwrap()
    message: >
      unwrap() on a network or file I/O operation will panic and crash
      the process on failure. Use proper error handling with match,
      if let, the ? operator, or unwrap_or_else to handle errors
      gracefully in production code.
    severity: WARNING
    languages: [rust]
    metadata:
      cwe: ["CWE-248"]
      owasp: ["A04:2021 Insecure Design"]
      confidence: MEDIUM
      impact: MEDIUM
      category: security

  # ---------------------------------------------------------------------------
  # Weak Random
  # ---------------------------------------------------------------------------
  - id: rust-weak-random
    patterns:
      - pattern-either:
          - pattern: |
              rand::thread_rng()
          - pattern: |
              thread_rng()
    message: >
      rand::thread_rng() is not suitable for security-sensitive contexts
      such as token generation, key derivation, or nonces. Use
      rand::rngs::OsRng or ring::rand::SystemRandom for
      cryptographically secure random values.
    severity: WARNING
    languages: [rust]
    metadata:
      cwe: ["CWE-330"]
      owasp: ["A02:2021 Cryptographic Failures"]
      confidence: LOW
      impact: MEDIUM
      category: security
